services:
  redis:
    image: redis:7-alpine
    container_name: electroshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Bật nếu muốn có UI xem nhanh dữ liệu Redis (không bắt buộc, dùng redis-cli cũng được)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: electroshop-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  redis-data: